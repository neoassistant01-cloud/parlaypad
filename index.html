<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ParlayPad - Sports Betting Calculator</title>
  <style>
    :root {
      --bg: #0d1117;
      --card-bg: #161b22;
      --input-bg: #21262d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #00cec9;
      --accent-dim: #00a8a3;
      --payout: #ff6b35;
      --danger: #f85149;
      --border: #30363d;
      --success: #3fb950;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 16px;
      line-height: 1.5;
    }
    .container { max-width: 600px; margin: 0 auto; }
    header {
      text-align: center;
      margin-bottom: 24px;
      padding: 20px 0;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    h1 span { color: var(--accent); }
    .subtitle {
      color: var(--text-muted);
      font-size: 0.875rem;
      margin-top: 4px;
    }
    .odds-format-toggle {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .toggle-btn {
      background: var(--input-bg);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.875rem;
      transition: all 0.15s;
    }
    .toggle-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
      font-weight: 600;
    }
    .toggle-btn:hover:not(.active) {
      border-color: var(--accent);
      color: var(--text);
    }
    .legs-container { display: flex; flex-direction: column; gap: 12px; }
    .leg {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: slideIn 0.2s ease-out;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .leg-number {
      width: 28px;
      height: 28px;
      background: var(--input-bg);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .leg-input {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 1rem;
      font-weight: 500;
      width: 100%;
      transition: border-color 0.15s;
    }
    .leg-input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .leg-input.positive { color: var(--success); }
    .leg-input.negative { color: var(--danger); }
    .leg-prob {
      width: 70px;
      text-align: right;
      font-size: 0.8rem;
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .remove-leg {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 6px;
      border-radius: 4px;
      font-size: 1.25rem;
      line-height: 1;
      transition: all 0.15s;
    }
    .remove-leg:hover {
      color: var(--danger);
      background: rgba(248,81,73,0.1);
    }
    .add-leg-btn {
      background: transparent;
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 16px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.15s;
      margin-top: 12px;
    }
    .add-leg-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .results-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-top: 24px;
    }
    .stake-input-group {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .stake-label {
      font-weight: 600;
      white-space: nowrap;
    }
    .stake-input {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 1rem;
      font-weight: 500;
    }
    .stake-input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .payout-display {
      text-align: center;
      padding: 20px 0;
    }
    .payout-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .payout-value {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--payout);
      margin-top: 4px;
    }
    .profit-value {
      font-size: 1rem;
      color: var(--success);
      margin-top: 4px;
    }
    .stake-suggestions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 16px;
    }
    .stake-option {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .stake-option:hover {
      border-color: var(--accent);
    }
    .stake-option-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .stake-option-value {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      margin-top: 4px;
    }
    .stake-option.safe .stake-option-value { color: var(--success); }
    .stake-option.aggressive .stake-option-value { color: var(--payout); }
    .actions-row {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }
    .action-btn {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      color: var(--text);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .action-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .action-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
    }
    .action-btn.primary:hover {
      background: var(--accent-dim);
    }
    .recent-section {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .recent-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .recent-title {
      font-size: 0.875rem;
      color: var(--text-muted);
      font-weight: 600;
    }
    .clear-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.75rem;
    }
    .clear-btn:hover { color: var(--danger); }
    .recent-list { display: flex; flex-direction: column; gap: 8px; }
    .recent-item {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .recent-item:hover {
      border-color: var(--accent);
    }
    .recent-item-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
    }
    .recent-item-legs { color: var(--text-muted); }
    .recent-item-payout { color: var(--payout); font-weight: 600; }
    .recent-item-date {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--card-bg);
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 12px 20px;
      color: var(--text);
      font-size: 0.875rem;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 1000;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    .empty-state {
      text-align: center;
      padding: 24px;
      color: var(--text-muted);
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Parlay<span>Pad</span></h1>
      <p class="subtitle">Sports Betting Odds Calculator</p>
    </header>

    <div class="odds-format-toggle">
      <button class="toggle-btn active" data-format="american">American</button>
      <button class="toggle-btn" data-format="decimal">Decimal</button>
      <button class="toggle-btn" data-format="fractional">Fractional</button>
    </div>

    <div class="legs-container" id="legsContainer"></div>

    <button class="add-leg-btn" id="addLegBtn">+ Add Leg</button>

    <div class="results-card">
      <div class="stake-input-group">
        <span class="stake-label">Stake: $</span>
        <input type="number" class="stake-input" id="stakeInput" value="100" min="1" step="1">
      </div>
      
      <div class="payout-display">
        <div class="payout-label">Parlay Payout</div>
        <div class="payout-value" id="payoutValue">$0.00</div>
        <div class="profit-value" id="profitValue">Profit: $0.00</div>
      </div>

      <div class="stake-suggestions">
        <div class="stake-option safe" id="safeStake">
          <div class="stake-option-label">Safe (5% profit)</div>
          <div class="stake-option-value" id="safeValue">$0</div>
        </div>
        <div class="stake-option aggressive" id="aggressiveStake">
          <div class="stake-option-label">Aggressive (20% profit)</div>
          <div class="stake-option-value" id="aggressiveValue">$0</div>
        </div>
      </div>

      <div class="actions-row">
        <button class="action-btn" id="copyBtn">📋 Copy</button>
        <button class="action-btn primary" id="saveBtn">💾 Save</button>
      </div>
    </div>

    <div class="recent-section" id="recentSection">
      <div class="recent-header">
        <span class="recent-title">Recent Calculations</span>
        <button class="clear-btn" id="clearRecentBtn">Clear</button>
      </div>
      <div class="recent-list" id="recentList"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const MAX_LEGS = 10;
    let legs = [];
    let oddsFormat = 'american';
    let currentPayout = 0;

    // Odds conversion functions
    function americanToDecimal(american) {
      if (american >= 100) return 1 + (american / 100);
      return 1 + (100 / Math.abs(american));
    }

    function decimalToAmerican(decimal) {
      if (decimal >= 2) return Math.round((decimal - 1) * 100);
      return Math.round(-100 / (decimal - 1));
    }

    function fractionalToDecimal(fraction) {
      const parts = fraction.split('/');
      if (parts.length !== 2) return null;
      const num = parseFloat(parts[0]);
      const den = parseFloat(parts[1]);
      if (isNaN(num) || isNaN(den) || den === 0) return null;
      return 1 + (num / den);
    }

    function parseOdds(value, format) {
      if (!value || value.trim() === '') return null;
      value = value.trim();
      
      if (format === 'decimal') {
        const dec = parseFloat(value);
        return isNaN(dec) || dec < 1 ? null : dec;
      }
      
      if (format === 'fractional') {
        return fractionalToDecimal(value);
      }
      
      // American
      const american = parseInt(value);
      if (isNaN(american) || Math.abs(american) < 100) return null;
      return americanToDecimal(american);
    }

    function formatOdds(decimal, format) {
      if (format === 'decimal') {
        return decimal.toFixed(2);
      }
      
      if (format === 'fractional') {
        const frac = decimal - 1;
        if (frac === 0) return '0/1';
        // Find closest fraction
        const fractions = [
          [1, 1], [1, 2], [1, 3], [2, 3], [1, 4], [3, 4], [1, 5], [2, 5],
          [3, 5], [4, 5], [1, 6], [5, 6], [1, 7], [1, 8], [3, 8], [5, 8],
          [1, 9], [2, 9], [4, 9], [5, 9], [1, 10], [3, 10], [7, 10]
        ];
        let best = fractions[0];
        let bestDiff = Math.abs(frac - (best[0]/best[1]));
        for (const [n, d] of fractions) {
          const diff = Math.abs(frac - (n/d));
          if (diff < bestDiff) {
            bestDiff = diff;
            best = [n, d];
          }
        }
        return `${best[0]}/${best[1]}`;
      }
      
      // American
      return decimalToAmerican(decimal).toString();
    }

    function impliedProbability(decimal) {
      return (1 / decimal) * 100;
    }

    function calculateParlayPayout(legsData, stake) {
      let decimalMultiplier = 1;
      for (const leg of legsData) {
        if (leg.decimal) {
          decimalMultiplier *= leg.decimal;
        }
      }
      return stake * decimalMultiplier;
    }

    function renderLegs() {
      const container = document.getElementById('legsContainer');
      container.innerHTML = '';
      
      legs.forEach((leg, index) => {
        const div = document.createElement('div');
        div.className = 'leg';
        
        const displayValue = leg.rawValue && leg.decimal 
          ? formatOdds(leg.decimal, oddsFormat)
          : '';
        
        const prob = leg.decimal ? impliedProbability(leg.decimal).toFixed(1) + '%' : '';
        
        let inputClass = '';
        if (leg.decimal) {
          const american = decimalToAmerican(leg.decimal);
          inputClass = american >= 0 ? 'positive' : 'negative';
        }
        
        div.innerHTML = `
          <div class="leg-number">${index + 1}</div>
          <input type="text" class="leg-input ${inputClass}" 
            placeholder="${oddsFormat === 'american' ? '+150' : oddsFormat === 'decimal' ? '2.50' : '3/2'}"
            value="${displayValue}" data-index="${index}">
          <div class="leg-prob">${prob}</div>
          <button class="remove-leg" data-index="${index}">×</button>
        `;
        
        container.appendChild(div);
      });
      
      // Add event listeners
      container.querySelectorAll('.leg-input').forEach(input => {
        input.addEventListener('input', handleLegInput);
      });
      
      container.querySelectorAll('.remove-leg').forEach(btn => {
        btn.addEventListener('click', handleRemoveLeg);
      });
    }

    function handleLegInput(e) {
      const index = parseInt(e.target.dataset.index);
      const value = e.target.value;
      const decimal = parseOdds(value, oddsFormat);
      
      legs[index] = { rawValue: value, decimal };
      
      updatePayout();
      saveToStorage();
    }

    function handleRemoveLeg(e) {
      const index = parseInt(e.target.dataset.index);
      legs.splice(index, 1);
      renderLegs();
      updatePayout();
      saveToStorage();
    }

    function addLeg() {
      if (legs.length >= MAX_LEGS) {
        showToast(`Maximum ${MAX_LEGS} legs allowed`);
        return;
      }
      legs.push({ rawValue: '', decimal: null });
      renderLegs();
      // Focus the new input
      const inputs = document.querySelectorAll('.leg-input');
      inputs[inputs.length - 1].focus();
    }

    function updatePayout() {
      const stake = parseFloat(document.getElementById('stakeInput').value) || 0;
      
      const validLegs = legs.filter(l => l.decimal !== null);
      
      if (validLegs.length === 0) {
        currentPayout = 0;
        document.getElementById('payoutValue').textContent = '$0.00';
        document.getElementById('profitValue').textContent = 'Profit: $0.00';
        document.getElementById('safeValue').textContent = '$0';
        document.getElementById('aggressiveValue').textContent = '$0';
        return;
      }
      
      currentPayout = calculateParlayPayout(validLegs, stake);
      const profit = currentPayout - stake;
      
      document.getElementById('payoutValue').textContent = '$' + currentPayout.toFixed(2);
      document.getElementById('profitValue').textContent = 'Profit: $' + profit.toFixed(2);
      
      // Stake suggestions based on implied probability
      const totalProb = validLegs.reduce((sum, l) => sum + (1/l.decimal), 0);
      
      // Safe: risk only 5% of bankroll per leg on average
      const safeStake = Math.round(stake * 0.5);
      // Aggressive: up to 20% per leg
      const aggressiveStake = Math.round(stake * 2);
      
      document.getElementById('safeValue').textContent = '$' + Math.max(1, safeStake);
      document.getElementById('aggressiveValue').textContent = '$' + Math.max(1, aggressiveStake);
    }

    function formatLegsForDisplay() {
      return legs
        .filter(l => l.decimal !== null)
        .map(l => formatOdds(l.decimal, oddsFormat))
        .join(', ');
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    function copyToClipboard() {
      if (currentPayout === 0) {
        showToast('Add legs to calculate payout');
        return;
      }
      
      const stake = document.getElementById('stakeInput').value;
      const text = `ParlayPad 🏈\n\nLegs: ${formatLegsForDisplay()}\nStake: $${stake}\nPayout: $${currentPayout.toFixed(2)}\nProfit: $${(currentPayout - stake).toFixed(2)}`;
      
      navigator.clipboard.writeText(text).then(() => {
        showToast('Copied to clipboard!');
      }).catch(() => {
        showToast('Failed to copy');
      });
    }

    function saveCalculation() {
      if (currentPayout === 0) {
        showToast('Add legs to save');
        return;
      }
      
      const validLegs = legs.filter(l => l.decimal !== null);
      if (validLegs.length === 0) return;
      
      const stake = document.getElementById('stakeInput').value;
      const calc = {
        legs: validLegs.map(l => l.decimal),
        stake: parseFloat(stake),
        payout: currentPayout,
        format: oddsFormat,
        date: Date.now()
      };
      
      const saved = getSavedCalculations();
      saved.unshift(calc);
      if (saved.length > 10) saved.pop();
      
      localStorage.setItem('parlaypad_calculations', JSON.stringify(saved));
      renderRecent();
      showToast('Calculation saved!');
    }

    function getSavedCalculations() {
      try {
        const data = localStorage.getItem('parlaypad_calculations');
        return data ? JSON.parse(data) : [];
      } catch {
        return [];
      }
    }

    function saveToStorage() {
      const data = {
        legs: legs.map(l => ({ rawValue: l.rawValue, decimal: l.decimal })),
        format: oddsFormat,
        stake: document.getElementById('stakeInput').value
      };
      localStorage.setItem('parlaypad_current', JSON.stringify(data));
    }

    function loadFromStorage() {
      try {
        const data = localStorage.getItem('parlaypad_current');
        if (data) {
          const parsed = JSON.parse(data);
          legs = parsed.legs || [];
          oddsFormat = parsed.format || 'american';
          document.getElementById('stakeInput').value = parsed.stake || '100';
          
          // Update toggle buttons
          document.querySelectorAll('.toggle-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.format === oddsFormat);
          });
        }
      } catch {
        // Start fresh
      }
    }

    function renderRecent() {
      const list = document.getElementById('recentList');
      const saved = getSavedCalculations();
      
      if (saved.length === 0) {
        list.innerHTML = '<div class="empty-state">No recent calculations</div>';
        return;
      }
      
      list.innerHTML = '';
      
      saved.forEach((calc, index) => {
        const item = document.createElement('div');
        item.className = 'recent-item';
        
        const legStr = calc.legs.map(d => formatOdds(d, calc.format || 'american')).join(', ');
        const date = new Date(calc.date);
        const dateStr = date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        item.innerHTML = `
          <div class="recent-item-header">
            <span class="recent-item-legs">${calc.legs.length} leg${calc.legs.length > 1 ? 's' : ''}</span>
            <span class="recent-item-payout">$${calc.payout.toFixed(2)}</span>
          </div>
          <div class="recent-item-date">${legStr} — ${dateStr}</div>
        `;
        
        item.addEventListener('click', () => loadCalculation(index));
        list.appendChild(item);
      });
    }

    function loadCalculation(index) {
      const saved = getSavedCalculations();
      const calc = saved[index];
      if (!calc) return;
      
      legs = calc.legs.map(d => ({ rawValue: '', decimal: d }));
      oddsFormat = calc.format || 'american';
      document.getElementById('stakeInput').value = calc.stake;
      
      document.querySelectorAll('.toggle-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.format === oddsFormat);
      });
      
      renderLegs();
      updatePayout();
      showToast('Calculation loaded');
    }

    function clearRecent() {
      localStorage.removeItem('parlaypad_calculations');
      renderRecent();
      showToast('Recent cleared');
    }

    // Event listeners
    document.getElementById('addLegBtn').addEventListener('click', addLeg);
    document.getElementById('stakeInput').addEventListener('input', updatePayout);
    document.getElementById('copyBtn').addEventListener('click', copyToClipboard);
    document.getElementById('saveBtn').addEventListener('click', saveCalculation);
    document.getElementById('clearRecentBtn').addEventListener('click', clearRecent);

    document.querySelectorAll('.toggle-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        oddsFormat = btn.dataset.format;
        renderLegs();
        saveToStorage();
      });
    });

    // Click suggestions to update stake
    document.getElementById('safeStake').addEventListener('click', () => {
      document.getElementById('stakeInput').value = document.getElementById('safeValue').textContent.replace('$','');
      updatePayout();
    });

    document.getElementById('aggressiveStake').addEventListener('click', () => {
      document.getElementById('stakeInput').value = document.getElementById('aggressiveValue').textContent.replace('$','');
      updatePayout();
    });

    // Initialize
    loadFromStorage();
    if (legs.length === 0) {
      legs = [
        { rawValue: '', decimal: null },
        { rawValue: '', decimal: null }
      ];
    }
    renderLegs();
    renderRecent();
    updatePayout();
  </script>
</body>
</html>
